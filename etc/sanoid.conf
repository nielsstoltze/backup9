# backup9 sanoid retention — one template, all FREJA datasets inherit.

[template_freja]
hourly  = 0
daily   = 30
weekly  = 12
monthly = 12
yearly  = 0
autosnap   = no   # the orchestrator takes the snapshot after each successful pull;
                  # sanoid only handles RETENTION (pruning).
autoprune  = yes

[backup/freja/Backup]
use_template = freja

[backup/freja/Birgitte]
use_template = freja

[backup/freja/Scanned]
use_template = freja

[backup/freja/Stoltze]
use_template = freja

[backup/freja/TC]
use_template = freja

[backup/freja/Yvonne]
use_template = freja
